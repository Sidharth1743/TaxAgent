<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TaxAgent Knowledge Graph</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Fira Sans", "Segoe UI", sans-serif;
        margin: 0;
        background: #f4f1ec;
        color: #1b1b1b;
      }
      header {
        padding: 16px 20px;
        background: #1f2a44;
        color: #fff;
      }
      .controls {
        display: flex;
        gap: 12px;
        padding: 12px 20px;
        background: #fff;
        border-bottom: 1px solid #e1ded9;
      }
      select, button {
        padding: 8px 10px;
        font-size: 14px;
      }
      #cy {
        width: 100%;
        height: calc(100vh - 120px);
        background: radial-gradient(circle at 10% 10%, #fff 0%, #f4f1ec 45%, #efe8dd 100%);
      }
    </style>
    <script src="https://unpkg.com/cytoscape@3.27.0/dist/cytoscape.min.js"></script>
  </head>
  <body>
    <header>
      <strong>TaxAgent Knowledge Graph</strong>
    </header>
    <div class="controls">
      <label>User:
        <select id="userSelect"></select>
      </label>
      <label>Session:
        <select id="sessionSelect"></select>
      </label>
      <button id="loadBtn">Load Graph</button>
    </div>
    <div id="cy"></div>

    <script>
      const userSelect = document.getElementById("userSelect");
      const sessionSelect = document.getElementById("sessionSelect");
      const loadBtn = document.getElementById("loadBtn");

      async function loadUsers() {
        const res = await fetch("/users");
        const data = await res.json();
        userSelect.innerHTML = `<option value="">All</option>` +
          data.users.map(u => `<option value="${u}">${u}</option>`).join("");
      }

      async function loadSessions(userId) {
        sessionSelect.innerHTML = `<option value="">All</option>`;
        if (!userId) return;
        const res = await fetch(`/sessions?user_id=${encodeURIComponent(userId)}`);
        const data = await res.json();
        sessionSelect.innerHTML += data.sessions.map(s => `<option value="${s}">${s}</option>`).join("");
      }

      async function loadGraph() {
        const userId = userSelect.value;
        const sessionId = sessionSelect.value;
        const params = new URLSearchParams();
        if (userId) params.set("user_id", userId);
        if (sessionId) params.set("session_id", sessionId);
        const res = await fetch(`/graph?${params.toString()}`);
        const data = await res.json();

        const elements = [
          ...data.nodes.map(n => ({ data: { id: n.id, label: n.label, type: n.type } })),
          ...data.edges.map(e => ({ data: { source: e.from, target: e.to, label: e.type } })),
        ];

        cytoscape({
          container: document.getElementById("cy"),
          elements,
          style: [
            { selector: "node", style: { "label": "data(label)", "background-color": "#4b6b7a", "color": "#111", "font-size": "11px", "text-wrap": "wrap", "text-max-width": "140px" } },
            { selector: "edge", style: { "label": "data(label)", "line-color": "#a08e7c", "target-arrow-color": "#a08e7c", "target-arrow-shape": "triangle", "curve-style": "bezier", "font-size": "9px" } },
          ],
          layout: { name: "cose", animate: false },
        });
      }

      userSelect.addEventListener("change", () => loadSessions(userSelect.value));
      loadBtn.addEventListener("click", loadGraph);

      loadUsers().then(() => loadGraph());
    </script>
  </body>
</html>
