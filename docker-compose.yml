version: "3.8"

services:
  taxclarity:
    build: .
    ports:
      - "8080:8080"   # Live server (frontend + WebSocket)
      - "9000:9000"   # Graph API
      - "8000:8000"   # Root agent
      - "8001:8001"   # CAClub agent
      - "8002:8002"   # TaxTMI agent
      - "8003:8003"   # TurboTax agent
      - "8004:8004"   # TaxProfBlog agent
    env_file:
      - .env
    environment:
      - LIVE_SERVER_PORT=8080
      - ROOT_AGENT_URL=http://localhost:8000
      - GRAPH_API_URL=http://localhost:9000
    volumes:
      - ./data:/app/data
    restart: unless-stopped
